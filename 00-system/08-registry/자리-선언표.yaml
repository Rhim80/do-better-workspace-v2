# ============================================================
# 자리 선언표 — 내 표면이 어디 있고 어떤 모양인지
# ============================================================
# 이 파일은 "기계가 읽는 내 워크스페이스 지도"다. reply-draft(회신 초안)가
# 진행표 표면을 읽고, 다른 스킬은 자기 저장 경로의 참고 지도로 쓴다.
#
# 채우는 법:
#   [빈칸]  = 사람마다 다른 값. 실물(내 진행표·엑셀)을 열어 놓고 채운다.
#   기본값  = 이 워크스페이스 골격 그대로면 안 바꿔도 됨.
# 갱신 규칙: 표면의 위치·모양을 바꾸면 반드시 이 파일도 같이 고친다.

뿌리:
  워크스페이스: "git 저장소 루트 (스킬이 자동 감지: git rev-parse --show-toplevel)"

# ------------------------------------------------------------
# 표면 — 정보가 최종적으로 놓이는 파일들
# ------------------------------------------------------------
표면:

  할일:
    위치: "40-personal/46-todos/active-todos.md"
    무엇: 할 일 + 회신대기
    모양:
      섹션: ["🔥 Today", "📅 This Week", "⏳ Waiting"]
    쓰는스킬: [todo, todos, daily-note, daily-review]

  일기:
    위치: "40-personal/41-daily/YYYY-MM/YYYY-MM-DD.md"
    무엇: 하루치 일정+할 일+진행+완료+회고
    쓰는스킬: [daily-note, daily-review]
    보호단위: "구역 — 회고 등 사람이 쓴 구역은 기계가 덮지 않는다"

  위키:
    위치: "30-knowledge/00-wiki/"
    무엇: 토픽별 지식 복리 축적
    모양: "SCHEMA.md가 정의"
    쓰는스킬: [wiki-ingest, wiki-lint]
    보호단위: 페이지

  진행표:   # [빈칸] — 내 업무의 중심 표면 (영업 파이프라인·수주 현황·프로젝트 보드 등. reply-draft가 발송 후 행 갱신을 제안. 없으면 이 절 삭제)
    위치: "[빈칸 — 예: 10-projects/XX-업무/진행표.md]"
    무엇: "[빈칸 — 무엇을 추적하는 표인가]"
    모양:
      칸: "[빈칸 — 열 이름들]"
    단어약속:
      단계: "[빈칸 — 단계 칸에 쓸 단어 목록을 고정한다. 변형 금지]"
    보호단위: "행·칸 규칙 — 기계가 써도 되는 칸과 사람 칸을 정한다"
    쓰는스킬: [reply-draft]

# ------------------------------------------------------------
# 파일 밖 표면 — 파일이 아니라서 보호 단위·이력(git)이 적용 안 되는 표면
# ------------------------------------------------------------
파일밖표면:
  캘린더:   # [빈칸] — 캘린더 연동이 있으면 채우고, 없으면 이 절 삭제
    무엇: "[빈칸 — 어떤 캘린더들 (업무/개인 구분)]"
    캘린더구분: "[빈칸 — 어떤 일정이 어느 캘린더로 가나]"
    흔적: "등록 시 일기·진행표에 함께 기록"
