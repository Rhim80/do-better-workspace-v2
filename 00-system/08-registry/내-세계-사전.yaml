# ============================================================
# 내 세계 사전 — 나만 아는 것들의 모음
# ============================================================
# "당연해서 안 적었던 앎"이 사는 곳. reply-draft(회신 초안)가 판단 재료로 읽는다.
# 스킬 파일에는 개인 데이터가 한 글자도 없다 — 전부 여기와 자리 선언표에서 온다.
#
# 채우는 법: 처음엔 거의 비어 있는 게 정상. 쓰다가 "이건 항상 이렇게 해줘"라고
#   교정하는 순간이 오면, 그 교정을 여기 한 줄로 적는다 — 그때부터 영구 규칙이 된다.
#   (쓸수록 똑똑해지는 지점. 갱신은 사람이 직접 한다.)

회신-원칙:  # reply-draft(회신 절차)가 읽는 내 값 — 말투·금지 표현·첨부
  금지-표현:  # 본문에 절대 안 들어갈 패턴 — reply-draft 검증이 grep으로 잡는다
    # [빈칸] — 예:
    # - 패턴: "(만원|[0-9]+ ?원|VAT)"
    #   설명: "본문 금액 노출 금지 — 가격은 첨부가 담당"
  톤:
    # [빈칸] — 예: "정중하되 담백하게. 빈 칭찬·부풀린 정중체 금지. 서명은 '{이름} 드림'"
  첨부:
    기본-경로: ""   # [빈칸] — 회신에 첨부할 자료가 모여 있는 폴더 (실존 확인에 사용)
    표준-첨부:
      # [빈칸] — 예: "회사 소개서.pdf (가격 포함)"
